name: 每日標案爬蟲

on:
  workflow_dispatch:           # 由 Make.com 定時呼叫（dry-run 與真推播都用這個），或手動觸發
    inputs:
      dry_run:
        description: 'Dry run（不推播 LINE、不寫 state/sent_log）'
        type: boolean
        default: false

permissions:
  contents: write           # 允許 workflow 將 state.json commit 回 main

jobs:
  scrape:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests beautifulsoup4 lxml

      - name: Run scraper
        run: python scraper.py 2>&1 | tee scraper_output.log
        env:
          LINE_CHANNEL_TOKEN:  ${{ secrets.LINE_CHANNEL_TOKEN }}
          ANTHROPIC_API_KEY:   ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_TOKEN:        ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPO:         ${{ github.repository }}
          DRY_RUN: ${{ inputs.dry_run }}

      - name: 寫入 Job Summary（供人工或 Claude Code 自動 QA 閱讀）
        if: always()
        run: |
          {
            if [ "${{ inputs.dry_run }}" = "true" ]; then
              echo "## 🔍 Dry-Run（QA 預覽，未推播 LINE）"
            else
              echo "## 🚀 真實執行（已推播 LINE）"
            fi
            echo '```'
            cat scraper_output.log
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
