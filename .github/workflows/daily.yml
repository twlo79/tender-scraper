name: 每日標案爬蟲

on:
  schedule:
    - cron: '37 3 * * *'      # 每天 03:37 UTC 自動 dry-run（QA 預覽，不推播 LINE、不寫 state/sent_log）
  workflow_dispatch:           # 手動觸發：確認 dry-run QA 沒問題後，人工執行才真正推播
    inputs:
      dry_run:
        description: 'Dry run（不推播 LINE、不寫 state/sent_log）'
        type: boolean
        default: false

permissions:
  contents: write           # 允許 workflow 將 state.json commit 回 main

jobs:
  scrape:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests beautifulsoup4 lxml

      - name: Run scraper
        run: python scraper.py 2>&1 | tee scraper_output.log
        env:
          LINE_CHANNEL_TOKEN:  ${{ secrets.LINE_CHANNEL_TOKEN }}
          ANTHROPIC_API_KEY:   ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_TOKEN:        ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPO:         ${{ github.repository }}
          # 排程觸發 = 強制 dry-run（QA 預覽）；手動觸發則依 input 決定（預設真推播）
          DRY_RUN: ${{ github.event_name == 'schedule' && 'true' || (github.event.inputs.dry_run || 'false') }}

      - name: 寫入 Job Summary（供人工或 Claude Code 自動 QA 閱讀）
        if: always()
        run: |
          {
            if [ "${{ github.event_name }}" = "schedule" ]; then
              echo "## 🔍 排程 Dry-Run（QA 預覽，未推播 LINE）"
            else
              echo "## 🚀 手動執行（dry_run=${{ github.event.inputs.dry_run || 'false' }}）"
            fi
            echo '```'
            cat scraper_output.log
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
