name: Cleanup old Claude branches

on:
  schedule:
    - cron: '0 2 * * 0'   # 每週日 02:00 UTC 自動跑
  workflow_dispatch:       # 也可手動觸發

permissions:
  contents: write

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Delete old claude/* branches (older than 7 days)
        uses: actions/github-script@v8
        with:
          script: |
            const { data: branches } = await github.rest.repos.listBranches({
              owner: context.repo.owner,
              repo: context.repo.repo,
              per_page: 100,
            });

            const now = Date.now();
            const cutoff = 7 * 24 * 60 * 60 * 1000; // 7 天

            for (const branch of branches) {
              if (!branch.name.startsWith('claude/')) continue;

              const { data: commit } = await github.rest.repos.getCommit({
                owner: context.repo.owner,
                repo: context.repo.repo,
                ref: branch.commit.sha,
              });

              const age = now - new Date(commit.commit.committer.date).getTime();
              if (age > cutoff) {
                await github.rest.git.deleteRef({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  ref: `heads/${branch.name}`,
                });
                console.log(`Deleted: ${branch.name}`);
              } else {
                console.log(`Kept (too new): ${branch.name}`);
              }
            }
